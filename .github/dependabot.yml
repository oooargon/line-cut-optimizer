version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 5
  groups:
    github-actions:
      patterns:
      - "*"

- package-ecosystem: "npm"
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 10
  groups:
    npm-production:
      dependency-type: "production"
      patterns:
      - "*"
    npm-development:
      dependency-type: "development"
      patterns:
      - "*"
